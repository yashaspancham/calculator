[pytest]

log_file = logs/calculator.log                                                
log_file_level = DEBUG
log_file_format = %(asctime)s - %(levelname)s - %(message)s                   
log_file_date_format = %Y-%m-%d %H:%M:%S                                      
log_cli = true
log_cli_level = INFO                                                          
markers = test_calculate_expression
        test_button_clicked
        test_ui
